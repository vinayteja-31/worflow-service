name: 'Tower Cloud Container Deploy (Node.js)'
description: 'Deploy a container image to Tower Cloud — IAM login, preflight check, container update via API gateway'
branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  tower-user:
    description: 'Tower Cloud username'
    required: true
  tower-password:
    description: 'Tower Cloud password'
    required: true
  organization-id:
    description: 'Tower Cloud organization ID'
    required: true
  container-name:
    description: 'Name of the existing container instance to update'
    required: true
  image:
    description: 'Full image URI to deploy (e.g. registry.tower.cloud/repo/app:tag). If not provided, auto-generates as {registry-url}/{registry-repo}:{github-sha}.'
    required: false
    default: ''
  registry-url:
    description: 'Container registry URL (e.g. test2.hyd.cr.tower.cloud). Required if image is not provided.'
    required: false
    default: ''
  registry-repo:
    description: 'Repository path in registry (e.g. my-org/my-app). Optional — auto-generates as {github-repo-name}/{container-name} if not provided.'
    required: false
    default: ''
  registry-username:
    description: 'Registry username (for private/tower registries)'
    required: false
    default: ''
  registry-password:
    description: 'Registry password (for private/tower registries)'
    required: false
    default: ''

outputs:
  status:
    description: 'Deployment status (accepted)'
  image:
    description: 'The image URI that was deployed'
  task-id:
    description: 'Deployment task ID returned by Tower Cloud'

runs:
  using: 'node20'
  main: 'dist/index.js'
