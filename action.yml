name: 'Tower Cloud Container Deploy (Node.js)'
description: 'Deploy a container image to Tower Cloud — IAM login, preflight check, container update, rollout polling via API gateway'
branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  tower-api-url:
    description: 'Tower Cloud API gateway URL (e.g. https://api.dev.tower.cloud). Falls back to TOWER_API_URL variable.'
    required: false
    default: ''
  tower-user:
    description: 'Tower Cloud username'
    required: true
  tower-password:
    description: 'Tower Cloud password'
    required: true
  organization-id:
    description: 'Tower Cloud organization ID'
    required: true
  container-name:
    description: 'Name of the existing container instance to update'
    required: true
  image:
    description: 'Full image URI to deploy (e.g. ghcr.io/org/repo:sha or registry.tower.cloud/repo/app:tag)'
    required: true
  registry-username:
    description: 'Registry username (for private/tower registries)'
    required: false
    default: ''
  registry-password:
    description: 'Registry password (for private/tower registries)'
    required: false
    default: ''
  rollout-timeout-seconds:
    description: 'Max seconds to wait for rollout to reach terminal state'
    required: false
    default: '600'
  poll-interval-seconds:
    description: 'Seconds between status poll requests'
    required: false
    default: '5'

outputs:
  status:
    description: 'Terminal container state (running, ready, healthy, succeeded)'
  image:
    description: 'The image URI that was deployed'

runs:
  using: 'node20'
  main: 'dist/index.js'
